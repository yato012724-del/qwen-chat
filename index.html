<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Afina AI — Qwen 2.5</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="assets/chat.css" />
</head>
<body>

<!-- ── FULL-WIDTH HEADER (outside centered container) ─────── -->
<header id="chat-header">
  <div class="h-cluster h-left">
    <div class="logo-mark" aria-label="Afina AI">
      <svg class="logo-svg" viewBox="0 0 48 48" fill="none">
        <circle class="logo-orbit" cx="24" cy="24" r="20.5"
          stroke="currentColor" stroke-width="1.3"
          stroke-dasharray="16 8 4 8" stroke-linecap="round"/>
        <path class="logo-glyph"
          d="M24 11L35.5 37M24 11L12.5 37M16.5 27.5h15"
          stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round"/>
        <circle class="logo-dot" cx="24" cy="24" r="2" fill="currentColor"/>
      </svg>
    </div>
    <button class="header-btn" id="clear-btn" data-tooltip="Очистить чат" data-tooltip-dir="right">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
        <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
      </svg>
    </button>
  </div>

  <div class="h-center">
    <span class="model-name">Qwen 2.5</span>
  </div>

  <div class="h-cluster h-right">
    <button class="header-btn" id="theme-btn" data-tooltip="Сменить тему" data-tooltip-dir="left">
      <svg id="icon-moon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg id="icon-sun" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" style="display:none">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </div>
</header>

<!-- ── CENTERED CHAT BODY ─────────────────────────────────── -->
<div id="my-custom-chat">

  <main id="chat-messages-container">
    <div id="welcome-screen">
      <div class="welcome-inner">
        <svg class="logo-svg welcome-logo-large" viewBox="0 0 80 80" fill="none">
          <circle class="logo-orbit" cx="40" cy="40" r="34.5"
            stroke="currentColor" stroke-width="1.2"
            stroke-dasharray="22 11 6 11" stroke-linecap="round"/>
          <circle cx="40" cy="40" r="27" stroke="currentColor" stroke-width="0.7" opacity="0.2"/>
          <path class="logo-glyph"
            d="M40 18L56 62M40 18L24 62M28 48h24"
            stroke="currentColor" stroke-width="2.8"
            stroke-linecap="round" stroke-linejoin="round"/>
          <circle class="logo-dot" cx="40" cy="40" r="3.5" fill="currentColor"/>
        </svg>
        <p class="welcome-hint">Задайте вопрос или прикрепите файл</p>
        <div id="welcome-content-slot"></div>
      </div>
    </div>
  </main>

  <footer id="chat-bottom-section">
    <button id="scroll-to-bottom" class="hidden" aria-label="Прокрутить вниз">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 9l6 6 6-6"/>
      </svg>
    </button>

    <div id="typing-indicator" class="hidden">
      <span id="typing-text">Формулирую ответ</span>
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>

    <input type="file" id="file-input" hidden multiple />
    <div id="file-preview-container"></div>

    <div class="chat-input-area">
      <div class="input-wrapper">
        <textarea id="user-input" placeholder="Сообщение Qwen 2.5..." rows="1"></textarea>
        <div class="input-bottom-row">
          <div class="input-left-btns">
            <button class="input-icon-btn" id="attach-btn" data-tooltip="Прикрепить файл">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
              </svg>
            </button>
            <button class="input-icon-btn" id="mic-btn" data-tooltip="Голосовой ввод">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="2" width="6" height="12" rx="3"/>
                <path d="M5 10a7 7 0 0 0 14 0M12 19v3M9 22h6"/>
              </svg>
            </button>
          </div>
          <button class="send-btn" id="action-btn" aria-label="Отправить">
            <svg id="send-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
            </svg>
            <svg id="stop-icon" viewBox="0 0 24 24" width="14" height="14" fill="white" style="display:none">
              <rect x="4" y="4" width="16" height="16" rx="3"/>
            </svg>
          </button>
        </div>
      </div>
      <p class="input-hint">Афина ИИ может ошибаться. Проверяйте важную информацию.</p>
    </div>
  </footer>

</div>

<!-- ── Mobile context menu ─────────────────────────────────── -->
<div id="ctx-overlay" class="hidden"></div>
<div id="ctx-menu" class="hidden">
  <div class="ctx-handle"></div>
  <div class="ctx-items">
    <button class="ctx-item" id="ctx-copy-btn">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      <span>Копировать</span>
    </button>
    <button class="ctx-item hidden" id="ctx-edit-btn">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      <span>Редактировать</span>
    </button>
    <button class="ctx-item hidden" id="ctx-retry-btn">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-4.34"/>
      </svg>
      <span>Повторить</span>
    </button>
  </div>
</div>

<div class="creatium-external-slot" hidden></div>
<script src="assets/chat.js"></script>
</body>
</html>
