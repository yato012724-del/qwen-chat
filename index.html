<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>Qwen AI Chat</title>
  <meta name="description" content="ИИ-ассистент Qwen 2.5 — работает на вашем устройстве">
  <meta name="theme-color" content="#2563eb">
  
  <!-- Шрифты -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Markdown парсер -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <!-- Стили -->
  <link rel="stylesheet" href="assets/chat.css">
</head>
<body>

<div id="qc">
  <!-- ТУЛБАР -->
  <div id="qc-bar">
    <div id="qc-bar-l">
      <div id="qc-ava">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
      </div>
      <div>
        <div id="qc-name">Qwen<span id="qc-n2"> 2.5</span></div>
        <div id="qc-stat">загрузка...</div>
      </div>
    </div>
    <div id="qc-bar-r">
      <button class="qc-tb" id="qc-theme" title="Тема">
        <svg class="i-sun" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0zM7.05 18.36l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0z"/></svg>
        <svg class="i-moon" viewBox="0 0 24 24" style="display:none"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
      </button>
      <button class="qc-tb" id="qc-think" title="Глубокое мышление">
        <svg viewBox="0 0 24 24"><path d="M13 8.57c-.79 0-1.43.64-1.43 1.43s.64 1.43 1.43 1.43 1.43-.64 1.43-1.43S13.79 8.57 13 8.57zM13 3C9.25 3 6.2 5.94 6.02 9.64L4.1 12.2c-.25.33-.01.8.4.8H6v3c0 1.1.9 2 2 2h1v3h7v-4.68c2.36-1.12 4-3.53 4-6.32 0-3.87-3.13-7-7-7zm3 7c0 .13-.01.26-.02.39l.83.66c.08.06.1.16.05.25l-.8 1.39c-.05.09-.16.12-.24.09l-.99-.4c-.21.16-.43.29-.67.39L14 13.83c-.01.1-.1.17-.2.17h-1.6c-.1 0-.18-.07-.2-.17l-.15-1.06c-.25-.1-.47-.23-.68-.39l-.99.4c-.09.03-.2 0-.25-.09l-.8-1.39a.2.2 0 0 1 .05-.25l.84-.66C10.01 10.26 10 10.13 10 10s.01-.26.03-.39l-.84-.66a.19.19 0 0 1-.05-.25l.8-1.39c.05-.09.15-.12.25-.09l.99.4c.21-.16.43-.29.68-.39l.15-1.06c.01-.1.1-.17.2-.17h1.6c.1 0 .18.07.2.17l.15 1.06c.24.1.46.23.67.39l.99-.4c.09-.04.19 0 .24.09l.8 1.39c.05.09.03.19-.05.25l-.83.66c.01.13.02.26.02.39z"/></svg>
      </button>
      <button class="qc-tb" id="qc-refresh" title="Новый чат">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
      <button class="qc-tb" id="qc-clear" title="Очистить">
        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </button>
    </div>
  </div>

  <!-- ЛЕНТА СООБЩЕНИЙ -->
  <div id="qc-msgs">
    <div id="qc-welcome">
      <div id="qc-wi"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg></div>
      <h2 id="qc-wh">Привет! Я&thinsp;<span>Qwen 2.5</span>&thinsp;👋</h2>
      <p id="qc-wp">Задайте вопрос, загрузите файл или выберите подсказку</p>
      <div id="qc-chips">
        <button class="qc-chip" data-p="write">✍️ Написать текст</button>
        <button class="qc-chip" data-p="task">🔍 Разобрать задачу</button>
        <button class="qc-chip" data-p="file">📄 Анализ файла</button>
      </div>
    </div>
  </div>

  <!-- КНОПКА ВНИЗ -->
  <button id="qc-dn" aria-label="Вниз">
    <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
  </button>

  <!-- НИЖНЯЯ ПАНЕЛЬ -->
  <div id="qc-bot">
    <input type="file" id="qc-fi" multiple style="display:none!important" accept=".txt,.md,.csv,.json,.pdf,.png,.jpg,.jpeg,.gif,.webp,.py,.js,.ts,.html,.css,.xml,.yaml,.yml,.log,.sh,.xlsx,.docx">
    <div id="qc-pills"></div>
    <div id="qc-inarea">
      <div id="qc-wrap">
        <button class="qc-ib" id="qc-att" title="Прикрепить файл">
          <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
        </button>
        <button class="qc-ib" id="qc-mic" title="Голос">
          <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <div id="qc-wave"><s></s><s></s><s></s><s></s><s></s><s></s><s></s><s></s></div>
        <textarea id="qc-in" placeholder="Напишите сообщение..." rows="1" autocomplete="off" spellcheck="true" enterkeyhint="send"></textarea>
        <button id="qc-send" title="Отправить">
          <svg id="qc-sic" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          <svg id="qc-pic" viewBox="0 0 24 24" style="display:none"><path d="M6 6h12v12H6z"/></svg>
        </button>
      </div>
    </div>
    <div id="qc-disclaimer">ИИ может допускать ошибки. Проверяйте важную информацию.</div>
  </div>
</div>

<!-- Скрипт -->
<script src="assets/chat.js"></script>
</body>
</html>
