<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>Nova AI</title>
  <meta name="description" content="Nova AI — умный ассистент от Nova">
  <meta name="theme-color" content="#f97316">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Critical inline CSS — prevents giant SVG flash -->
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{overflow:hidden;height:100%;width:100%;margin:0;padding:0;background:#fafafa;font-family:'Outfit',sans-serif}
    #nova{position:fixed;inset:0;display:flex;overflow:hidden;background:#fafafa}
    #nova-main{flex:1;display:flex;flex-direction:column;height:100%;min-width:0;position:relative}
    #nova-sidebar{transform:translateX(-100%);position:absolute;z-index:100;width:280px;height:100%;left:0;top:0;bottom:0}
    #nova-sb-overlay{display:none}
    #nova svg{display:inline-block;vertical-align:middle;flex-shrink:0}
    #nova-msgs{flex:1;overflow-y:auto;overflow-x:hidden}
    #nova-welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:100%;padding:20px}
    .nova-w-icon{width:72px;height:72px;border-radius:22px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
    #nova-dl-bar{display:none}
  </style>

  <link rel="stylesheet" href="assets/chat.css">
</head>
<body>

<div id="nova">
  <!-- ═══ SIDEBAR ═══ -->
  <div id="nova-sidebar">
    <div class="nova-sb-header">
      <div class="nova-sb-logo">
        <div class="nova-sb-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        </div>
        <span class="nova-sb-brand">Nova AI</span>
      </div>
      <button class="nova-sb-close" id="nova-sb-close-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>

    <button class="nova-sb-new" id="nova-sb-new-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      Новый чат
    </button>

    <div class="nova-sb-chats" id="nova-sb-chats"></div>

    <div class="nova-sb-footer">
      <button class="nova-sb-action" id="nova-sb-export">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        Экспорт чата
      </button>
      <button class="nova-sb-action" id="nova-sb-import">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
        Импорт чата
      </button>
    </div>
  </div>

  <!-- Sidebar overlay -->
  <div id="nova-sb-overlay"></div>

  <!-- ═══ MAIN ═══ -->
  <div id="nova-main">

    <!-- HEADER -->
    <div id="nova-header">
      <div class="nova-h-left">
        <button class="nova-menu-btn" id="nova-menu-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </button>
        <div class="nova-h-brand">
          <div class="nova-h-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
          </div>
          <div>
            <div class="nova-h-name">Nova AI</div>
            <div class="nova-h-status" id="nova-h-status">загрузка...</div>
          </div>
        </div>
      </div>
      <div class="nova-h-right">
        <button class="nova-hb" id="nova-theme-btn" title="Тема">
          <svg class="i-sun" width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0zM7.05 18.36l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0z"/></svg>
          <svg class="i-moon" width="15" height="15" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
        </button>
        <button class="nova-hb" id="nova-settings-btn" title="Настройки">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        </button>
      </div>
    </div>

    <!-- DOWNLOAD PROGRESS — STICKY -->
    <div id="nova-dl-bar">
      <div class="nova-dl-icon">🧠</div>
      <div class="nova-dl-info">
        <div class="nova-dl-text">Инициализация...</div>
        <div class="nova-dl-track"><div class="nova-dl-fill"></div></div>
        <div class="nova-dl-pct">0%</div>
      </div>
      <button class="nova-dl-cancel" id="nova-dl-cancel-btn">Отмена</button>
    </div>

    <!-- MESSAGES -->
    <div id="nova-msgs">
      <div id="nova-welcome">
        <div class="nova-w-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        </div>
        <h2 class="nova-w-title">Привет! Я <span>Nova AI</span> 👋</h2>
        <p class="nova-w-sub">Умный ассистент от Nova. Задайте вопрос, загрузите файл или выберите подсказку</p>
        <div class="nova-w-chips">
          <button class="nova-chip" data-p="write">✍️ Написать</button>
          <button class="nova-chip" data-p="task">🔍 Задача</button>
          <button class="nova-chip" data-p="file">📄 Файл</button>
          <button class="nova-chip" data-p="idea">💡 Идея</button>
        </div>
      </div>
    </div>

    <!-- SCROLL DOWN -->
    <button id="nova-scroll-dn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
    </button>

    <!-- ═══ BOTTOM ═══ -->
    <div id="nova-bottom">
      <input type="file" id="nova-fi" multiple accept=".txt,.md,.csv,.json,.pdf,.png,.jpg,.jpeg,.gif,.webp,.py,.js,.ts,.html,.css,.xml,.yaml,.yml,.log,.sh,.xlsx,.docx,.sql,.env,.ini,.toml,.c,.cpp,.java,.rb,.go,.rs,.swift,.kt">
      <div id="nova-pills"></div>

      <div class="nova-toggles">
        <button class="nova-toggle think" id="nova-toggle-think">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
          Мышление
        </button>
        <button class="nova-toggle search" id="nova-toggle-search">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          Поиск
        </button>
      </div>

      <div id="nova-input-area">
        <div id="nova-input-wrap">
          <button class="nova-ib" id="nova-att" title="Файл">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
          </button>
          <button class="nova-ib" id="nova-mic" title="Голос">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
          </button>
          <div id="nova-wave"><s></s><s></s><s></s><s></s><s></s><s></s></div>
          <textarea id="nova-input" placeholder="Сообщение для Nova..." rows="1" autocomplete="off" spellcheck="true" enterkeyhint="send"></textarea>
          <button id="nova-send" title="Отправить">
            <svg id="nova-sic" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            <svg id="nova-pic" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 6h12v12H6z"/></svg>
          </button>
        </div>
      </div>
      <div id="nova-disclaimer">Nova AI может ошибаться. Проверяйте важную информацию.</div>
    </div>

  </div>
</div>

<script src="assets/chat.js"></script>
</body>
</html>
