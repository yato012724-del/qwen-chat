<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,interactive-widget=resizes-content">
<title>Nova AI</title>
<meta name="theme-color" content="#f97316">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════
   NOVA AI — Modern Chat Interface
   Gradient: yellow → orange → red → purple
   Design: Clean minimalism with warm accents
═══════════════════════════════════════════════════════ */

html, body {
  overflow: hidden !important;
  height: 100% !important;
  width: 100% !important;
  margin: 0 !important;
  padding: 0 !important;
  overscroll-behavior: none !important;
}

/* SVG safety — never expand beyond container */
#nova svg {
  display: inline-block !important;
  vertical-align: middle !important;
  flex-shrink: 0 !important;
  overflow: hidden !important;
}

/* ── LIGHT TOKENS ── */
:root {
  --f: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
  --mo: 'JetBrains Mono', monospace;
  --nova-1: #f59e0b;
  --nova-2: #f97316;
  --nova-3: #ef4444;
  --nova-4: #a855f7;
  --nova-g: linear-gradient(135deg, #f59e0b, #f97316, #ef4444, #a855f7);
  --nova-g2: linear-gradient(135deg, #fbbf24, #fb923c, #f87171, #c084fc);
  --bg: #fafafa;
  --pn: #ffffff;
  --inp: #ffffff;
  --bot: #ffffff;
  --cd: #1a1a2e;
  --sidebar-bg: #ffffff;
  --brd: rgba(0,0,0,.06);
  --brf: #f97316;
  --t1: #0f0f0f;
  --t2: #6b7280;
  --t3: #9ca3af;
  --ac: #f97316;
  --ag: rgba(249,115,22,.15);
  --as: rgba(249,115,22,.06);
  --er: #ef4444;
  --ok: #10b981;
  --wn: #f59e0b;
  --s1: 0 1px 2px rgba(0,0,0,.04);
  --s2: 0 2px 12px rgba(0,0,0,.06);
  --sa: 0 4px 16px rgba(249,115,22,.2);
  --ez: cubic-bezier(.4,0,.2,1);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
}

/* ── DARK ── */
[data-theme="dark"] {
  --bg: #0a0a0f;
  --pn: #131320;
  --inp: #1a1a2e;
  --bot: #16162a;
  --cd: #0d0d1a;
  --sidebar-bg: #111122;
  --brd: rgba(255,255,255,.06);
  --brf: #fb923c;
  --t1: #f0f0f5;
  --t2: #9ca3af;
  --t3: #4b5563;
  --ac: #fb923c;
  --ag: rgba(251,146,60,.2);
  --as: rgba(251,146,60,.08);
  --s1: 0 1px 3px rgba(0,0,0,.3);
  --s2: 0 4px 16px rgba(0,0,0,.3);
  --sa: 0 4px 16px rgba(251,146,60,.25);
}
[data-theme="dark"] body { background: #0a0a0f !important; }

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
button { font-family: var(--f); cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; border: none; background: none; }

/* ═══ APP SHELL ═══ */
#nova {
  position: fixed;
  inset: 0;
  font-family: var(--f);
  background: var(--bg);
  display: flex;
  overflow: hidden;
  transition: background .3s var(--ez);
  color: var(--t1);
}

/* ═══ SIDEBAR ═══ */
#nova-sidebar {
  width: 280px;
  height: 100%;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--brd);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transform: translateX(-100%);
  position: absolute;
  left: 0; top: 0; bottom: 0;
  z-index: 100;
  transition: transform .3s var(--ez);
}
#nova-sidebar.open { transform: translateX(0); }

.nova-sb-header {
  padding: 20px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--brd);
}
.nova-sb-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.nova-sb-icon {
  width: 36px; height: 36px;
  min-width: 36px; min-height: 36px;
  border-radius: 10px;
  background: var(--nova-g);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--sa);
  overflow: hidden;
  flex-shrink: 0;
}
.nova-sb-icon svg { width: 18px !important; height: 18px !important; fill: #fff !important; }
.nova-sb-brand {
  font-size: 16px;
  font-weight: 700;
  background: var(--nova-g);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.nova-sb-close {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: var(--t3);
  transition: all .15s;
}
.nova-sb-close svg { width: 18px; height: 18px; fill: currentColor; }

.nova-sb-new {
  margin: 12px 16px;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  background: var(--nova-g);
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: opacity .15s, transform .15s;
  box-shadow: var(--sa);
}
.nova-sb-new svg { width: 16px; height: 16px; fill: currentColor; }

.nova-sb-chats {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.nova-sb-chats::-webkit-scrollbar { width: 3px; }
.nova-sb-chats::-webkit-scrollbar-thumb { background: var(--brd); border-radius: 3px; }

.nova-chat-item {
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 2px;
}
.nova-chat-item.active {
  background: var(--as);
  color: var(--ac);
}
.nova-chat-item-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--as);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.nova-chat-item-icon svg { width: 14px; height: 14px; fill: var(--ac); }
.nova-chat-item-text {
  flex: 1;
  min-width: 0;
}
.nova-chat-item-title {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.nova-chat-item-date {
  font-size: 11px;
  color: var(--t3);
  margin-top: 2px;
}
.nova-chat-item-del {
  width: 24px; height: 24px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: var(--t3);
  opacity: 0;
  transition: all .15s;
  flex-shrink: 0;
}
.nova-chat-item-del svg { width: 13px; height: 13px; fill: currentColor; }

/* Sidebar bottom actions */
.nova-sb-footer {
  border-top: 1px solid var(--brd);
  padding: 8px;
}
.nova-sb-action {
  width: 100%;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--t2);
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all .15s;
  font-weight: 500;
}
.nova-sb-action svg { width: 16px; height: 16px; fill: currentColor; }

/* Sidebar overlay */
#nova-sb-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.3);
  z-index: 99;
  display: none;
  animation: fadeIn .2s ease;
}
#nova-sb-overlay.show { display: block; }
@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

/* ═══ MAIN AREA ═══ */
#nova-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100%;
  min-width: 0;
  position: relative;
}

/* ── HEADER ── */
#nova-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  padding-top: max(12px, env(safe-area-inset-top, 12px));
  background: transparent;
  z-index: 30;
  transition: background .2s, box-shadow .2s;
  flex-shrink: 0;
}
#nova-header.scrolled {
  background: var(--pn);
  box-shadow: 0 1px 8px rgba(0,0,0,.04);
}
[data-theme="dark"] #nova-header.scrolled {
  box-shadow: 0 1px 8px rgba(0,0,0,.3);
}

.nova-h-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.nova-h-right {
  display: flex;
  align-items: center;
  gap: 6px;
}

.nova-menu-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: var(--t2);
  transition: all .15s;
}
.nova-menu-btn svg { width: 20px; height: 20px; fill: currentColor; }

.nova-h-brand {
  display: flex;
  align-items: center;
  gap: 8px;
}
.nova-h-icon {
  width: 30px; height: 30px;
  min-width: 30px; min-height: 30px;
  border-radius: 8px;
  background: var(--nova-g);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--sa);
  overflow: hidden;
  flex-shrink: 0;
}
.nova-h-icon svg { width: 15px !important; height: 15px !important; fill: #fff !important; }
.nova-h-name {
  font-size: 15px;
  font-weight: 700;
  background: var(--nova-g);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.nova-h-status {
  font-size: 11px;
  color: var(--ok);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 4px;
}
.nova-h-status::before {
  content: '';
  width: 5px; height: 5px;
  background: var(--ok);
  border-radius: 50%;
  animation: blink 2s ease-in-out infinite;
}
.nova-h-status.busy { color: var(--wn); }
.nova-h-status.busy::before { background: var(--wn); }
.nova-h-status.err { color: var(--er); }
.nova-h-status.err::before { background: var(--er); animation: none; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Header buttons */
.nova-hb {
  width: 34px; height: 34px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--brd);
  background: var(--pn);
  color: var(--t2);
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.nova-hb svg { width: 15px; height: 15px; fill: currentColor; }
.nova-hb:active {
  transform: scale(.92);
  background: var(--ac);
  color: #fff;
  border-color: var(--ac);
}

/* ═══ MESSAGES AREA ═══ */
#nova-msgs {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 8px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
}
#nova-msgs::-webkit-scrollbar { width: 3px; }
#nova-msgs::-webkit-scrollbar-thumb { background: var(--brd); border-radius: 3px; }

/* ── WELCOME ── */
#nova-welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-height: 100%;
  padding: 20px;
  animation: welIn .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes welIn { from { opacity:0; transform:translateY(16px)scale(.97) } to { opacity:1; transform:none } }
#nova-welcome.out { animation: welOut .25s ease forwards; }
@keyframes welOut { to { opacity:0; transform:translateY(-10px)scale(.98) } }

.nova-w-icon {
  width: 72px; height: 72px;
  min-width: 72px; min-height: 72px;
  max-width: 72px; max-height: 72px;
  border-radius: 22px;
  background: var(--nova-g);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 12px 32px rgba(249,115,22,.25);
  margin-bottom: 20px;
  animation: float 4s ease-in-out infinite;
  overflow: hidden;
  flex-shrink: 0;
}
.nova-w-icon svg { width: 32px !important; height: 32px !important; fill: #fff !important; flex-shrink: 0; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

.nova-w-title {
  font-size: clamp(22px,4vw,28px);
  font-weight: 700;
  margin-bottom: 8px;
  line-height: 1.3;
}
.nova-w-title span {
  background: var(--nova-g);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.nova-w-sub {
  font-size: 14px;
  color: var(--t2);
  max-width: 320px;
  line-height: 1.6;
}
.nova-w-chips {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-top: 24px;
}
.nova-chip {
  background: var(--pn);
  border: 1px solid var(--brd);
  border-radius: 20px;
  padding: 9px 16px;
  font-size: 13px;
  color: var(--t2);
  transition: all .15s;
  white-space: nowrap;
  font-family: var(--f);
  font-weight: 500;
}
.nova-chip:active {
  background: var(--ac);
  color: #fff;
  border-color: var(--ac);
  transform: scale(.95);
}

/* ── MODEL DOWNLOAD PROGRESS — STICKY ── */
#nova-dl-bar {
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--pn);
  border-bottom: 1px solid var(--brd);
  padding: 10px 16px;
  display: none;
  align-items: center;
  gap: 12px;
  box-shadow: var(--s2);
  animation: slideDown .3s ease;
}
@keyframes slideDown { from { transform:translateY(-100%); opacity:0 } to { transform:none; opacity:1 } }
#nova-dl-bar.show { display: flex; }
.nova-dl-icon { font-size: 22px; flex-shrink: 0; }
.nova-dl-info { flex: 1; min-width: 0; }
.nova-dl-text { font-size: 12px; color: var(--t2); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nova-dl-track { height: 4px; background: var(--brd); border-radius: 2px; overflow: hidden; }
.nova-dl-fill { height: 100%; background: var(--nova-g); border-radius: 2px; transition: width .3s; width: 0; }
.nova-dl-pct { font-size: 11px; color: var(--ac); font-weight: 600; margin-top: 2px; font-family: var(--mo); }
.nova-dl-cancel {
  padding: 6px 12px;
  border: 1px solid var(--brd);
  border-radius: var(--radius-xs);
  font-size: 12px;
  color: var(--t3);
  transition: all .15s;
  font-family: var(--f);
  flex-shrink: 0;
}
.nova-dl-cancel:active { background: var(--er); color: #fff; border-color: var(--er); }

/* ── BUBBLES ── */
.nova-msg {
  display: flex;
  flex-direction: column;
  max-width: min(80%, 640px);
  gap: 3px;
  animation: msgIn .25s cubic-bezier(.34,1.3,.64,1) both;
}
@keyframes msgIn { from { opacity:0; transform:translateY(8px)scale(.98) } to { opacity:1; transform:none } }
.nova-msg.user { align-self: flex-end; align-items: flex-end; }
.nova-msg.bot { align-self: flex-start; align-items: flex-start; }
.nova-msg.gen .nova-msg-actions { visibility: hidden; pointer-events: none; }

.nova-msg-bubble {
  padding: 12px 16px;
  font-size: 14.5px;
  line-height: 1.65;
  word-wrap: break-word;
  word-break: break-word;
}
.nova-msg.user .nova-msg-bubble {
  background: var(--nova-g);
  color: #fff;
  border-radius: 20px 20px 4px 20px;
  box-shadow: var(--sa);
}
.nova-msg.bot .nova-msg-bubble {
  background: var(--bot);
  color: var(--t1);
  border-radius: 4px 20px 20px 20px;
  box-shadow: var(--s2);
  border: 1px solid var(--brd);
}

.nova-msg-time {
  font-size: 10px;
  color: var(--t3);
  padding: 0 6px;
}

/* Loading dots */
.nova-dots {
  display: flex;
  gap: 4px;
  align-items: center;
  height: 20px;
}
.nova-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--ac);
  animation: dot 1.4s infinite ease-in-out both;
}
.nova-dots span:nth-child(1) { animation-delay: -.32s }
.nova-dots span:nth-child(2) { animation-delay: -.16s }
@keyframes dot { 0%,80%,100%{transform:scale(.4);opacity:.3} 40%{transform:scale(1);opacity:1} }

/* ── ACTIONS ── */
.nova-msg-actions {
  display: flex;
  gap: 2px;
  padding: 0 4px;
}
.nova-act {
  width: 28px; height: 28px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  color: var(--t3);
  transition: all .12s;
}
.nova-act svg { width: 14px; height: 14px; fill: currentColor; }
.nova-act:active { background: var(--ac); color: #fff; transform: scale(.9); }
.nova-act.ok { color: var(--ok); }

/* ── MARKDOWN ── */
.nova-cnt p { margin: 0 0 8px; }
.nova-cnt p:last-child { margin: 0; }
.nova-cnt strong { font-weight: 700; }
.nova-cnt em { font-style: italic; }
.nova-cnt h1,.nova-cnt h2,.nova-cnt h3 { margin: 12px 0 6px; font-weight: 700; line-height: 1.3; }
.nova-cnt h1 { font-size: 17px; }
.nova-cnt h2 { font-size: 15.5px; }
.nova-cnt h3 { font-size: 14.5px; }
.nova-cnt ul,.nova-cnt ol { margin: 0 0 8px; padding-left: 18px; }
.nova-cnt li { margin-bottom: 3px; }
.nova-cnt blockquote { border-left: 3px solid var(--ac); padding-left: 12px; margin: 8px 0; color: var(--t2); font-style: italic; }
.nova-cnt table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
.nova-cnt th,.nova-cnt td { border: 1px solid var(--brd); padding: 5px 8px; }
.nova-cnt th { background: var(--as); font-weight: 600; }
.nova-cnt code { font-family: var(--mo); background: rgba(249,115,22,.1); color: var(--ac); padding: 2px 5px; border-radius: 4px; font-size: 13px; }
.nova-msg.user .nova-cnt code { background: rgba(255,255,255,.2); color: #fff; }
.nova-cnt pre { background: var(--cd); border-radius: 12px; margin: 10px 0; overflow: hidden; box-shadow: var(--s2); }
.nova-pre-hdr { display: flex; align-items: center; justify-content: space-between; padding: 5px 10px; background: rgba(255,255,255,.04); border-bottom: 1px solid rgba(255,255,255,.06); }
.nova-pre-lang { font-family: var(--mo); font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: .08em; }
.nova-pre-cp { background: rgba(255,255,255,.08); border: none; color: #94a3b8; font-size: 11px; font-family: var(--f); padding: 3px 8px; border-radius: 4px; display: flex; align-items: center; gap: 3px; transition: all .15s; cursor: pointer; }
.nova-pre-cp svg { width: 11px; height: 11px; fill: currentColor; }
.nova-cnt pre code { background: none; color: #e2e8f0; font-size: 13px; padding: 10px; display: block; overflow-x: auto; line-height: 1.6; }

/* Files in bubble */
.nova-msg-files { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,.15); }
.nova-file-tag { background: rgba(255,255,255,.15); border-radius: 6px; padding: 2px 8px; font-size: 11px; display: flex; align-items: center; gap: 3px; }
.nova-file-tag svg { width: 10px; height: 10px; fill: currentColor; }

/* Truncated text indicator */
.nova-trunc { font-size: 12px; color: var(--t3); font-style: italic; display: flex; align-items: center; gap: 6px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--brd); }

/* ── SCROLL DOWN ── */
#nova-scroll-dn {
  position: absolute;
  bottom: calc(var(--bot-h, 80px) + 8px);
  right: 14px;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--pn);
  border: 1px solid var(--brd);
  box-shadow: var(--s2);
  color: var(--t2);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transform: translateY(8px);
  transition: all .2s;
  z-index: 25;
}
#nova-scroll-dn.on { opacity: 1; pointer-events: auto; transform: none; }
#nova-scroll-dn svg { width: 16px; height: 16px; fill: currentColor; }

/* ═══ BOTTOM PANEL ═══ */
#nova-bottom {
  background: var(--pn);
  border-top: 1px solid var(--brd);
  z-index: 20;
  flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom, 0);
  transition: background .25s;
}

/* File pills */
#nova-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 8px 16px 0;
}
#nova-pills:empty { padding: 0; }
.nova-pill {
  background: var(--as);
  border: 1px solid var(--brd);
  border-radius: var(--radius-sm);
  padding: 4px 8px;
  font-size: 12px;
  color: var(--t2);
  display: flex; align-items: center;
  gap: 5px;
  max-width: 180px;
}
.nova-pill svg { width: 12px; height: 12px; fill: var(--ac); flex-shrink: 0; }
.nova-pill-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 110px; }
.nova-pill-rm {
  width: 16px; height: 16px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--t3);
  flex-shrink: 0;
  cursor: pointer;
  transition: all .15s;
}
.nova-pill-rm svg { width: 10px; height: 10px; fill: currentColor; }

/* ── MODE TOGGLES — inside input ── */
.nova-toggles {
  display: flex;
  gap: 4px;
  padding: 6px 16px 0;
}
.nova-toggle {
  padding: 4px 10px;
  border-radius: 14px;
  font-size: 12px;
  font-weight: 500;
  color: var(--t3);
  display: flex;
  align-items: center;
  gap: 4px;
  transition: all .15s;
  border: 1px solid transparent;
  font-family: var(--f);
}
.nova-toggle svg { width: 13px; height: 13px; fill: currentColor; }
.nova-toggle.active {
  color: var(--ac);
  background: var(--as);
  border-color: var(--ag);
}
.nova-toggle.active.think {
  background: linear-gradient(135deg, rgba(168,85,247,.1), rgba(249,115,22,.1));
  border-color: rgba(168,85,247,.3);
  color: #a855f7;
}
.nova-toggle.active.think svg { fill: #a855f7; }
.nova-toggle.active.search {
  background: rgba(16,185,129,.08);
  border-color: rgba(16,185,129,.25);
  color: #10b981;
}
.nova-toggle.active.search svg { fill: #10b981; }
.nova-toggle:active { transform: scale(.95); }

/* ── INPUT ── */
#nova-input-area { padding: 8px 16px 8px; }

#nova-input-wrap {
  display: flex;
  align-items: flex-end;
  background: var(--inp);
  border: 1.5px solid var(--brd);
  border-radius: 24px;
  padding: 4px 4px 4px 8px;
  gap: 2px;
  transition: border-color .15s, box-shadow .15s;
}
#nova-input-wrap:focus-within {
  border-color: var(--brf);
  box-shadow: 0 0 0 3px var(--ag);
}
#nova-input-wrap.rec {
  border-color: var(--er);
  box-shadow: 0 0 0 3px rgba(239,68,68,.15);
  animation: recPulse 1.8s ease-in-out infinite;
}
@keyframes recPulse { 0%,100%{box-shadow:0 0 0 3px rgba(239,68,68,.12)} 50%{box-shadow:0 0 0 6px rgba(239,68,68,.04)} }

.nova-ib {
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--t3);
  flex-shrink: 0;
  transition: all .12s;
}
.nova-ib svg { width: 18px; height: 18px; fill: currentColor; }
.nova-ib:active { background: var(--ac); color: #fff; transform: scale(.9); }
#nova-mic.rec { color: var(--er); background: rgba(239,68,68,.1); animation: micPulse 1.5s infinite; }
@keyframes micPulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)} 50%{box-shadow:0 0 0 6px rgba(239,68,68,0)} }

/* Wave */
#nova-wave { display: none; align-items: center; gap: 2px; padding: 0 4px; height: 34px; flex-shrink: 0; }
#nova-wave.on { display: flex; }
#nova-wave s { display: block; width: 3px; background: var(--er); border-radius: 2px; text-decoration: none; animation: wave 1s ease-in-out infinite; }
#nova-wave s:nth-child(1){height:5px;animation-delay:0s} #nova-wave s:nth-child(2){height:12px;animation-delay:.1s}
#nova-wave s:nth-child(3){height:20px;animation-delay:.2s} #nova-wave s:nth-child(4){height:14px;animation-delay:.3s}
#nova-wave s:nth-child(5){height:22px;animation-delay:.4s} #nova-wave s:nth-child(6){height:16px;animation-delay:.35s}
@keyframes wave { 0%,100%{transform:scaleY(.3);opacity:.3} 50%{transform:scaleY(1);opacity:1} }

#nova-input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 7px 4px;
  font-size: 14.5px;
  font-family: var(--f);
  line-height: 1.5;
  color: var(--t1);
  resize: none;
  max-height: 150px;
  overflow-y: auto;
  caret-color: var(--ac);
}
#nova-input::placeholder { color: var(--t3); }
#nova-input:focus { outline: none; }

#nova-send {
  background: var(--nova-g);
  color: #fff;
  border-radius: 50%;
  width: 36px; height: 36px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--sa);
  transition: all .15s;
}
#nova-send:active { transform: scale(.9); box-shadow: none; }
#nova-send.stop { background: var(--er); box-shadow: 0 4px 14px rgba(239,68,68,.3); }
#nova-send svg { width: 16px; height: 16px; fill: currentColor; }

/* Hidden file input */
#nova-fi { display: none !important; }

/* Disclaimer */
#nova-disclaimer {
  text-align: center;
  font-size: 10.5px;
  color: var(--t3);
  padding: 2px 16px 6px;
  opacity: .6;
  user-select: none;
}

/* ── TOAST ── */
#nova-toast {
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(-16px);
  background: var(--t1);
  color: var(--bg);
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--s2);
  z-index: 200;
  pointer-events: none;
  opacity: 0;
  transition: all .2s;
}
#nova-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── MODE SELECT MODAL ── */
#nova-mode-modal {
  position: absolute;
  inset: 0;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: rgba(0,0,0,.4);
  backdrop-filter: blur(4px);
  animation: fadeIn .25s ease;
}
.nova-modal-card {
  background: var(--pn);
  border-radius: 20px;
  padding: 24px;
  max-width: 360px;
  width: 100%;
  box-shadow: 0 16px 48px rgba(0,0,0,.15);
  animation: msgIn .3s cubic-bezier(.34,1.3,.64,1) both;
}
.nova-modal-title {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 4px;
}
.nova-modal-desc {
  font-size: 13px;
  color: var(--t2);
  margin-bottom: 16px;
}
.nova-modal-opts { display: flex; flex-direction: column; gap: 8px; }
.nova-modal-opt {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  border: 1.5px solid var(--brd);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all .15s;
}
.nova-modal-opt.active { border-color: var(--ac); background: var(--as); }
.nova-modal-opt.disabled { opacity: .35; cursor: not-allowed; }
.nova-modal-opt-icon { font-size: 24px; flex-shrink: 0; }
.nova-modal-opt-name { font-size: 14px; font-weight: 600; }
.nova-modal-opt-desc { font-size: 12px; color: var(--t2); }
.nova-modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.nova-modal-btn {
  padding: 8px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  transition: all .15s;
  font-family: var(--f);
}
.nova-modal-cancel { background: var(--brd); color: var(--t2); }
.nova-modal-save { background: var(--nova-g); color: #fff; box-shadow: var(--sa); }

/* ── DND ── */
#nova.drag::after {
  content: 'Перетащите файлы сюда';
  position: absolute;
  inset: 0;
  background: rgba(249,115,22,.06);
  border: 2px dashed var(--ac);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 600;
  color: var(--ac);
  z-index: 300;
  pointer-events: none;
}

/* ═══ RESPONSIVE ═══ */
@media (min-width: 768px) {
  #nova-sidebar {
    position: relative;
    transform: none;
  }
  #nova-sidebar:not(.open) {
    transform: translateX(-100%);
    position: absolute;
  }
  #nova-sb-overlay { display: none !important; }
}

@media (max-width: 600px) {
  #nova-msgs { padding: 6px 10px 8px; gap: 10px; }
  .nova-msg { max-width: 90%; }
  .nova-msg-bubble { padding: 10px 13px; font-size: 14px; }
  #nova-input-area { padding: 6px 10px 8px; }
}

/* ═══ HOVER (pointer devices only) ═══ */
@media (hover: hover) and (pointer: fine) {
  .nova-hb:hover { background: var(--as); color: var(--ac); border-color: var(--ag); }
  .nova-chip:hover { background: var(--as); color: var(--ac); border-color: var(--ac); }

  .nova-chat-item:hover .nova-chat-item-del { opacity: 1; }
  .nova-chat-item-del:hover { background: rgba(239,68,68,.1); color: var(--er); }
  .nova-sb-action:hover { background: var(--as); color: var(--ac); }
  .nova-toggle:hover { color: var(--t1); background: var(--as); }
  .nova-menu-btn:hover { background: var(--as); color: var(--ac); }
  #nova-scroll-dn:hover { background: var(--ac); color: #fff; border-color: var(--ac); }
  .nova-pre-cp:hover { background: rgba(255,255,255,.16); color: #e2e8f0; }
  .nova-modal-opt:hover:not(.disabled) { border-color: var(--ac); background: var(--as); }
  .nova-dl-cancel:hover { color: var(--er); border-color: var(--er); }
}

/* ═══ MULTI-CHAT ═══ */
function createNewChat(noSwitch){
  saveCurrentChat();
  const ch = { id: uid(), title: '', created: Date.now(), exchanges: [], chatHistory: [] };
  allChats.push(ch);
  if(!noSwitch){
    activeChatId = ch.id;
    exchanges = [];
    chatHistory = [];
    rebuildUI();
  }
  saveAll();
  renderChatList();
  return ch.id;
}

function switchChat(id){
  if(id === activeChatId) return;
  if(isGen) return toast('Подождите завершения');
  saveCurrentChat();
  activeChatId = id;
  const ch = allChats.find(c => c.id === id);
  if(!ch) return;
  exchanges = ch.exchanges || [];
  chatHistory = ch.chatHistory || [];
  rebuildUI();
  renderChatList();
}

function deleteChat(id){
  allChats = allChats.filter(c => c.id !== id);
  if(id === activeChatId){
    if(allChats.length) switchChat(allChats[allChats.length-1].id);
    else createNewChat();
  }
  saveAll();
  renderChatList();
}

function saveCurrentChat(){
  const ch = allChats.find(c => c.id === activeChatId);
  if(!ch) return;
  ch.exchanges = exchanges.map(e => ({
    versions: e.versions.map(v => ({ text: v.text, filesInfo: v.filesInfo || [], botHTML: v.botHTML || '' })),
    vi: e.vi
  }));
  ch.chatHistory = chatHistory.slice(-MAX_HISTORY);
  // Auto title from first message
  if(!ch.title && exchanges.length){
    const first = exchanges[0]?.versions[0]?.text || '';
    ch.title = first.substring(0,40) || 'Чат';
  }
}

function rebuildUI(){
  msgs.innerHTML = '';
  if(!exchanges.length){
    msgs.appendChild(createWelcome());
    return;
  }
  exchanges.forEach((ex, i) => {
    const v = ex.versions[ex.vi];
    if(!v) return;
    const um = addMsg(v.text, 'user', v.filesInfo || [], i);
    ex.domUser = um.wrap;
    const bm = addMsg('', 'bot');
    ex.domBot = bm.cnt;
    if(v.botHTML){
      bm.cnt.innerHTML = v.botHTML;
      enhCode(bm.cnt);
    } else {
      bm.cnt.innerHTML = '<em style="color:var(--t3)">—</em>';
    }
    bm.wrap.classList.remove('gen');
  });
  scrollBot(true);
}

/* ═══ STORAGE ═══ */
function saveAll(){
  saveCurrentChat();
  try{
    const data = allChats.map(ch => ({
      id: ch.id, title: ch.title, created: ch.created,
      exchanges: (ch.exchanges||[]).map(e => ({
        versions: e.versions.map(v => ({ text:v.text, filesInfo:v.filesInfo||[], botHTML:v.botHTML||'' })),
        vi: e.vi
      })),
      chatHistory: (ch.chatHistory||[]).slice(-MAX_HISTORY)
    }));
    localStorage.setItem(STORE_KEY, JSON.stringify(data));
  }catch(e){ console.warn('save err', e); }
}

function loadAll(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    if(!Array.isArray(data) || !data.length) return;
    allChats = data.map(ch => ({
      ...ch,
      exchanges: (ch.exchanges||[]).map(e => ({
        versions: e.versions.map(v => ({...v, fileObjects:[]})),
        vi: e.vi, domUser: null, domBot: null
      })),
      chatHistory: ch.chatHistory || []
    }));
  }catch(e){ console.warn('load err', e); }
}

$('nova-sb-import')?.addEventListener('click', () => {

    const r = new FileReader();
    r.onload = () => {
      try{
        const data = JSON.parse(r.result);
        if(!data.id || !data.exchanges) throw new Error('bad format');
        data.id = uid(); // new id to avoid collision
        data.created = Date.now();
        data.exchanges = (data.exchanges||[]).map(ex => ({
          ...ex, domUser:null, domBot:null,
          versions: ex.versions.map(v => ({...v, fileObjects:[]}))
        }));
        allChats.push(data);
        switchChat(data.id);
        saveAll();
        toast('Чат импортирован');
        closeSidebar();
      }catch(err){ toast('Ошибка формата файла'); }
    };
    r.readAsText(f);
  };
  inp.click();
});

/* ═══ WebLLM ═══ */
async function initWLLM(){
  if(!navigator.gpu){ toast('WebGPU не поддерживается'); mode='server'; saveSettings({mode}); updMode(); return; }
  wllmAbort = false;
  try{
    setStatus('загрузка модели...','busy');
    showDL(0,'Инициализация...');
    const wl = await import('https://esm.run/@mlc-ai/web-llm');
    if(wllmAbort){ hideDL(); return; }
    engine = await wl.CreateMLCEngine(WEBLLM_MODEL, {
      initProgressCallback: r => {
        if(wllmAbort) return;
        showDL(Math.round((r.progress||0)*100), r.text||'Загрузка...');
      }
    });
    if(wllmAbort){ engine=null; hideDL(); return; }
    hideDL(); engineReady = true; updMode();
    toast('Модель загружена!');
  }catch(e){
    console.error('[WL]',e); hideDL();
    mode='server'; saveSettings({mode}); updMode();
    toast('Ошибка → режим сервера');
  }
}

/* Download progress — sticky bar */
function showDL(pct, txt){
  if(!dlBar) return;
  dlBar.classList.add('show');
  dlBar.querySelector('.nova-dl-text').textContent = txt;
  dlBar.querySelector('.nova-dl-fill').style.width = pct + '%';
  dlBar.querySelector('.nova-dl-pct').textContent = pct + '%';
}
function hideDL(){ if(dlBar) dlBar.classList.remove('show'); }
$('nova-dl-cancel-btn')?.addEventListener('click', () => {
  wllmAbort = true;
  hideDL();
  mode = 'server'; saveSettings({mode}); updMode();
  engine = null; engineReady = false;
  toast('Загрузка отменена');
});

async function callTool(name, params){
  try{
    const r = await fetch(TOOLS_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({tool:name, params:params||{}})
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  }catch(e){ return {error:e.message}; }
}

function addFiles(files){
  let rejected = 0;
  files.forEach(f => { if(f.size <= MAX_MB*1024*1024) attached.push(f); else rejected++; });
  if(rejected) toast(rejected + ' файл(ов) > ' + MAX_MB + ' МБ');
  renderPills();
}
function renderPills(){
  if(!pills) return;
  pills.innerHTML = '';
  attached.forEach((f,i) => {
    const d = document.createElement('div');
    d.className = 'nova-pill';
    d.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">${fileIcon(f)}</svg><span class="nova-pill-name" title="${esc(f.name)}">${esc(f.name)}</span><div class="nova-pill-rm" data-i="${i}"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></div>`;
    pills.appendChild(d);
  });
  pills.querySelectorAll('.nova-pill-rm').forEach(b => {
    b.onclick = () => { attached.splice(+b.dataset.i, 1); renderPills(); };
  });
  updLayout();
}

const FI_IMG = '<path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>';
const FI_PDF = '<path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>';
const FI_DOC = '<path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>';

function fileIconByName(n){ if(/\.(png|jpg|jpeg|gif|webp)$/i.test(n)) return FI_IMG; if(/\.pdf$/i.test(n)) return FI_PDF; return FI_DOC; }

/* File reading */
const TXT_RE = /\.(txt|md|csv|json|yaml|yml|xml|py|js|ts|html|css|sh|log|sql|env|ini|conf|toml|c|cpp|h|java|rb|go|rs|swift|kt)$/i;
const TXT_MT = ['text/', 'application/json', 'application/xml', 'application/javascript'];
function isTextFile(f){ return TXT_MT.some(m => f.type?.startsWith(m)) || TXT_RE.test(f.name); }
function readText(f){ return new Promise((ok,er) => { const r = new FileReader(); r.onload = () => ok(r.result); r.onerror = er; r.readAsText(f,'utf-8'); }); }
function readBase64(f){ return new Promise((ok,er) => { const r = new FileReader(); r.onload = () => ok(r.result); r.onerror = er; r.readAsDataURL(f); }); }

/* DnD */
let dc = 0;
nova.addEventListener('dragenter', e => { e.preventDefault(); dc++; nova.classList.add('drag'); });
nova.addEventListener('dragleave', () => { if(--dc <= 0){ dc=0; nova.classList.remove('drag'); } });
nova.addEventListener('dragover', e => e.preventDefault());
nova.addEventListener('drop', e => { e.preventDefault(); dc=0; nova.classList.remove('drag'); addFiles(Array.from(e.dataTransfer.files)); });
document.addEventListener('paste', e => { if(e.clipboardData?.files?.length) addFiles(Array.from(e.clipboardData.files)); });

/* ═══ CODE HIGHLIGHT ═══ */
function enhCode(el){
  el.querySelectorAll('pre').forEach(pre => {
    if(pre.querySelector('.nova-pre-hdr')) return;
    const code = pre.querySelector('code');
    const cls = [...(code?.classList||[])].find(c => c.startsWith('language-'));
    const lang = cls ? cls.replace('language-','') : 'code';
    const hdr = document.createElement('div');
    hdr.className = 'nova-pre-hdr';
    hdr.innerHTML = `<span class="nova-pre-lang">${esc(lang)}</span><button class="nova-pre-cp"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg></button>`;
    pre.insertBefore(hdr, pre.firstChild);
    hdr.querySelector('.nova-pre-cp').onclick = () => {
      navigator.clipboard.writeText(code ? code.innerText : pre.innerText).then(() => {
        const b = hdr.querySelector('.nova-pre-cp');
        b.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
        setTimeout(() => { b.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>'; }, 2000);
      });
    };
  });
}

/* ═══ UI TOGGLE ═══ */
function toggleUI(g){
  isGen = g;
  if(sendIcon) sendIcon.style.display = g ? 'none' : 'block';
  if(stopIcon) stopIcon.style.display = g ? 'block' : 'none';
  if(sendBtn) sendBtn.classList.toggle('stop', g);
  if(!g) updMode(); else setStatus('думает...','busy');
}

/* ═══ MESSAGES ═══ */
const IC_CP = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>';
const IC_OK = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
const IC_RT = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>';

function addMsg(text, side, filesInfo=[], exIdx=null){
  const wrap = document.createElement('div');
  wrap.className = 'nova-msg ' + (side === 'user' ? 'user' : 'bot');
  if(side === 'bot') wrap.classList.add('gen');

  const bbl = document.createElement('div');
  bbl.className = 'nova-msg-bubble';
  const cnt = document.createElement('div');
  cnt.className = 'nova-cnt';

  if(side === 'bot'){
    cnt.innerHTML = '<div class="nova-dots"><span></span><span></span><span></span></div>';
  } else {
    cnt.textContent = text;
    renderFilesBubble(cnt, filesInfo);
  }
  bbl.appendChild(cnt);
  wrap.appendChild(bbl);

  const mt = document.createElement('div');
  mt.className = 'nova-msg-time';
  mt.textContent = ftime();
  wrap.appendChild(mt);

  const ac = document.createElement('div');
  ac.className = 'nova-msg-actions';

  const cpBtn = mkAct(IC_CP, 'Копировать');
  cpBtn.onclick = () => {
    const raw = getTextOnly(cnt);
    navigator.clipboard.writeText(raw).then(() => {
      cpBtn.innerHTML = IC_OK; cpBtn.classList.add('ok');
      setTimeout(() => { cpBtn.innerHTML = IC_CP; cpBtn.classList.remove('ok'); }, 2000);
    });
  };
  ac.appendChild(cpBtn);

  if(side === 'bot'){
    const rtBtn = mkAct(IC_RT, 'Повторить');
    rtBtn.onclick = () => { wrap.remove(); doSend(lastTxt, true); };
    ac.appendChild(rtBtn);
  }
  wrap.appendChild(ac);
  msgs.appendChild(wrap);
  autoScroll = true;
  scrollBot();
  return {cnt, wrap};
}

function mkAct(html, title){
  const b = document.createElement('button');
  b.className = 'nova-act';
  b.title = title;
  b.innerHTML = html;
  return b;
}

function renderFilesBubble(cnt, fi){
  if(!fi?.length) return;
  const fd = document.createElement('div');
  fd.className = 'nova-msg-files';
  fi.forEach(f => {
    const n = typeof f === 'string' ? f : (f.name || '');
    fd.innerHTML += `<span class="nova-file-tag"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor">${fileIconByName(n)}</svg>${esc(n)}</span>`;
  });
  cnt.appendChild(fd);
}

function getTextOnly(cnt){
  const c = cnt.cloneNode(true);
  c.querySelector('.nova-msg-files')?.remove();
  return (c.textContent || '').trim();
}

/* ═══ WELCOME ═══ */

  d.id = 'nova-welcome';
  d.innerHTML = `
    <div class="nova-w-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    </div>
    <h2 class="nova-w-title">Привет! Я <span>Nova AI</span> 👋</h2>
    <p class="nova-w-sub">Умный ассистент от Nova. Задайте вопрос, загрузите файл или выберите подсказку</p>
    <div class="nova-w-chips">
      <button class="nova-chip" data-p="write">✍️ Написать</button>
      <button class="nova-chip" data-p="task">🔍 Задача</button>
      <button class="nova-chip" data-p="file">📄 Файл</button>
      <button class="nova-chip" data-p="idea">💡 Идея</button>
    </div>`;
  d.querySelectorAll('.nova-chip').forEach(c => {
    c.onclick = () => {
      const map = {write:'Помоги написать: ', task:'Помоги разобрать: ', idea:'Подкинь идею для: ', file:null};
      if(c.dataset.p === 'file'){ fi?.click(); return; }

/* ═══ VOICE ═══ */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SR && micBtn){
  const rec = new SR();
  rec.lang = 'ru-RU'; rec.continuous = false; rec.interimResults = true;
  let base = '';
  rec.onstart = () => { micBtn.classList.add('rec'); wrap?.classList.add('rec'); wave?.classList.add('on'); base = input?.value || ''; if(input) input.placeholder = '🎙 Говорите...'; };
  rec.onend = () => { micBtn.classList.remove('rec'); wrap?.classList.remove('rec'); wave?.classList.remove('on'); if(input) input.placeholder = 'Сообщение для Nova...'; input?.dispatchEvent(new Event('input')); };
  rec.onerror = e => { if(e.error !== 'aborted') console.warn('SR',e.error); };
  rec.onresult = e => {
    let fin='', inter='';
    for(let i=e.resultIndex; i<e.results.length; i++){
      const t = e.results[i][0].transcript;
      if(e.results[i].isFinal) fin += t; else inter += t;
    }
    if(fin) base += (base?' ':'') + fin.trim();
    if(input){ input.value = base + (inter ? ' '+inter : ''); input.dispatchEvent(new Event('input')); }
  };
  micBtn.onclick = () => { if(micBtn.classList.contains('rec')) rec.stop(); else rec.start(); };
} else if(micBtn) micBtn.style.display = 'none';

/* ═══ SEND ═══ */
if(sendBtn) sendBtn.onclick = () => { if(isGen){ abortCtrl?.abort(); return; } doSend(); };
input?.addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey && !isMob){ e.preventDefault(); if(!isGen) doSend(); } });

function doSend(mT, isRetry){
  if(isGen) return;
  const txt = mT != null ? mT : (input?.value || '').trim();
  const files = isRetry ? [...lastFiles] : [...attached];
  if(!txt && !files.length) return;

  // Remove welcome
  const wel = $('nova-welcome');
  if(wel){ wel.classList.add('out'); setTimeout(() => wel.remove(), 300); }

  // Ensure we have an active chat
  if(!activeChatId) createNewChat(true);

  lastTxt = txt;
  lastFiles = files;
  const exIdx = exchanges.length;

  if(!isRetry){
    const fileInfo = files.map(f => ({name:f.name}));
    const {cnt, wrap:w} = addMsg(txt || '📎 Файл(ы)', 'user', fileInfo, exIdx);
    exchanges.push({
      versions: [{text:txt, filesInfo:fileInfo, fileObjects:[...files], botHTML:''}],
      vi: 0, domUser: w, domBot: null
    });
  }
  resetInput();
  attached = [];
  renderPills();
  sendMsg(txt, files, exIdx);
}

/* ═══ GENERATE ═══ */
async function sendMsg(txt, files, exIdx){
  abortCtrl = new AbortController();
  toggleUI(true);
  autoScroll = true;
  scrollBot();
  const bm = addMsg('', 'bot');
  const cnt = bm.cnt, bW = bm.wrap;
  if(exchanges[exIdx]) exchanges[exIdx].domBot = cnt;

  try{
    // Build file context
    let fCtx = '';
    for(const f of files){
      if(f instanceof File){
        if(isTextFile(f)){
          try{
            const c = await readText(f);
            fCtx += `\n\n--- Файл: ${f.name} ---\n${c.substring(0, 8000)}\n--- Конец файла ---`;
          }catch{}
        } else if(f.type?.startsWith('image/')){
          try{
            const b64 = await readBase64(f);
            fCtx += `\n\n[Изображение: ${f.name} — содержимое закодировано в base64]`;
          }catch{}
        } else if(f.name.endsWith('.pdf')){
          fCtx += `\n\n[PDF файл: ${f.name} — текст не может быть извлечён на клиенте, обработайте на сервере]`;
        } else {
          try{
            const c = await readText(f);
            fCtx += `\n\n--- Файл: ${f.name} ---\n${c.substring(0, 8000)}\n--- Конец файла ---`;
          }catch{
            fCtx += `\n\n[Файл: ${f.name} — не удалось прочитать]`;
          }
        }
      }
    }

    let userContent = txt;
    if(fCtx) userContent += fCtx;

    // Build system prompt
    let sys = SYS_BASE;
    if(deepThink) sys += SYS_DEEP;
    if(forceSearch) sys += SYS_SEARCH;

    chatHistory.push({role:'user', content:userContent});

    if(mode === 'webgpu' && engineReady){
      await genLocal(userContent, sys, cnt, exIdx);
    } else {
      await genServer(userContent, sys, files, cnt, exIdx);
    }
  }catch(err){
    if(err.name === 'AbortError'){
      cnt.innerHTML += '<div class="nova-trunc"><em>⏹ Остановлено</em></div>';
    } else {
      cnt.innerHTML = `<span style="color:var(--er)">⚠️ ${esc(err.message)}</span>`;
      setStatus('ошибка','err');
    }
  }finally{
    if(exchanges[exIdx]) exchanges[exIdx].versions[exchanges[exIdx].vi].botHTML = cnt.innerHTML;
    toggleUI(false);
    bW.classList.remove('gen');
    abortCtrl = null;
    saveAll();
  }
}

/* ── LOCAL GENERATION ── */
async function genLocal(userContent, sys, cnt, exIdx){
  const localSys = sys + '\nВАЖНО: Когда нужна актуальная информация — вставь [SEARCH: запрос]. НЕ угадывай.';
  const msgList = [{role:'system', content:localSys}, ...chatHistory.slice(-MAX_HISTORY)];
  let botTxt = '', round = 0;

  while(round < 3){
    const res = await engine.chat.completions.create({messages:msgList, stream:true, temperature:0.7, max_tokens:2048});
    let ct = '';
    cnt.innerHTML = '';

    for await(const ch of res){
      if(abortCtrl?.signal.aborted) throw new DOMException('','AbortError');
      const d = ch.choices[0]?.delta?.content;
      if(d){ ct += d; botTxt = ct; cnt.innerHTML = md(ct); enhCode(cnt); scrollBot(); }
    }

    // Process [SEARCH: ...] commands
    const sm = ct.match(/\[SEARCH:\s*(.+?)\]/i);
    if(sm && round < 2){
      const q = sm[1].trim();
      cnt.innerHTML = md(ct.replace(sm[0], `*🔍 Ищу: "${q}"...*`));
      scrollBot();
      const r = await callTool('web_search', {query: q});
      const sCtx = r.result ? r.result.map(x => `${x.title}: ${x.snippet} (${x.url})`).join('\n') : 'Ничего не найдено';
      msgList.push({role:'assistant', content:ct});
      msgList.push({role:'user', content:`Результаты поиска "${q}":\n${sCtx}\n\nОтветь пользователю на основе найденных данных. Язык = язык вопроса. Укажи источники.`});
      botTxt = '';
      round++;
      continue;
    }

    // Strip <think> tags for display
    let display = botTxt.replace(/<think>[\s\S]*?<\/think>/g, '').trim();
    if(display !== botTxt){
      cnt.innerHTML = md(display);
      enhCode(cnt);
    }
    chatHistory.push({role:'assistant', content:botTxt});
    break;
  }
}

/* ── SERVER GENERATION ── */
async function genServer(txt, sys, files, cnt, exIdx){
  const payload = {
    chatInput: txt,
    sessionId: activeChatId || 'default',
    systemPrompt: sys
  };

  const fOpts = {
    method: 'POST',
    signal: abortCtrl.signal,
    headers: {'Content-Type':'application/json', 'Accept':'text/event-stream'},
    body: JSON.stringify(payload)
  };

  const res = await fetch(CHAT_URL, fOpts);
  if(!res.ok) throw new Error('HTTP ' + res.status);

  const reader = res.body.getReader();
  const dec = new TextDecoder('utf-8');
  let buf = '', botTxt = '', first = true;

  while(true){
    const {done, value} = await reader.read();
    if(done) break;
    buf += dec.decode(value, {stream:true});
    buf = buf.replace(/}\s*\{/g, '}\n{');
    const lines = buf.split('\n');
    buf = lines.pop() ?? '';

    for(const raw of lines){
      let ln = raw.trim();
      if(ln.startsWith('data:')) ln = ln.slice(5).trim();
      if(!ln || ln === '[DONE]') continue;
      try{
        const o = JSON.parse(ln);
        const ch = o.content ?? o.message ?? o.text ?? o.output ?? o.delta ?? null;
        if(ch !== null){
          if(first){ cnt.innerHTML = ''; first = false; }
          botTxt += ch;
          cnt.innerHTML = md(botTxt);
          enhCode(cnt);
          scrollBot();
        }
      }catch{}
    }
  }

  // Process remaining buffer
  if(buf.trim()){
    let ln = buf.trim();
    if(ln.startsWith('data:')) ln = ln.slice(5).trim();
    if(ln && ln !== '[DONE]'){
      try{
        const o = JSON.parse(ln);
        const ch = o.content ?? o.message ?? o.text ?? o.output ?? null;
        if(ch){ if(first) cnt.innerHTML = ''; botTxt += ch; cnt.innerHTML = md(botTxt); enhCode(cnt); scrollBot(); }
      }catch{}
    }
  }

  chatHistory.push({role:'assistant', content:botTxt});
}

/* ═══ INIT ═══ */
function init(){
  loadAll();
  if(!allChats.length) createNewChat(true);
  activeChatId = activeChatId || allChats[allChats.length-1]?.id;
  const ch = allChats.find(c => c.id === activeChatId);
  if(ch){
    exchanges = ch.exchanges || [];
    chatHistory = ch.chatHistory || [];
  }
  rebuildUI();
  updMode();
  if(mode === 'webgpu') initWLLM();
  renderChatList();
}

setTimeout(init, 50);

})();
